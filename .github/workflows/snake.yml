name: Generate Contribution Snake

on:
  # Her gün 00:00 UTC'de çalışır
  schedule:
    - cron: "0 0 * * *"
  # Workflow dosyasına push olunca çalışır
  push:
    branches:
      - master
      - main
  # Actions sekmesinden elle tetiklemek için
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#00b3d6&color_dots=#ebedf0,#a5e9f5,#5fd2e8,#1fbfdb,#00a8cc
            dist/github-contribution-grid-snake-dark.svg?color_snake=#00D9FF&color_dots=#161b22,#0a3d4d,#0a6e85,#00a8cc,#00D9FF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
